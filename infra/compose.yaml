services:
  app:
    build:
      context: ../
      dockerfile: infra/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - database
    restart: unless-stopped
  database:
    image: "postgres:16.0-alpine"
    env_file:
      - ../.env.development
    ports:
      - "5432:5432"
